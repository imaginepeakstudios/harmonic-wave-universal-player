<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Harmonic Wave Universal Player</title>
    <meta
      name="description"
      content="Open-source HWES v1 reference implementation. Composes any creator's content into a directed, immersive experience."
    />
    <meta name="theme-color" content="#0B0F14" />
    <meta name="robots" content="index, follow" />

    <!--
      TV-feel design language (locked 2026-04-19 per user direction):
        "needs to feel like you're watching and hearing something
         not just going to some website"
        "needs to support both desktop/tablet/mobile"
        "critical it's responsive"

      Translation to CSS:
        - Player fills the entire viewport. No max-width card framing.
        - Chrome (header + controls) overlays the content with translucent
          backing and AUTO-HIDES after inactivity (3s). User wakes them
          by moving the mouse, tapping the screen, or pressing a key.
        - Content cards (audio/video/image) are full-bleed, no card
          borders, no padding when they own the screen.
        - Touch-friendly hit targets (44px+) on tablet/mobile.
        - Safe-area insets for notched phones (`env(safe-area-inset-*)`).
        - 100svh + 100dvh fallback chain for mobile address-bar reality.
        - Visualizer + scene layers fill behind the content as designed.

      Theme custom properties below get overridden at runtime by the
      theme injector when player_theme is present.
    -->
    <style id="player-theme-defaults">
      :root {
        --player-font-family: 'Inter', sans-serif;
        --player-font-display: 'Orbitron', sans-serif;
        --player-primary: #6dd3ff;
        --player-secondary: #a07adc;
        --player-background: #0b0f14;
        --player-text: #eaf2f8;
        --player-text-muted: #9ba6b2;
        --player-border: rgba(255, 255, 255, 0.08);

        /* TV-feel constants */
        --player-chrome-fade-ms: 380ms;
        --player-touch-target: 44px;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: var(--player-background);
        color: var(--player-text);
        font-family: var(--player-font-family);
        /* Lock the page — no scroll. The player IS the viewport. */
        overflow: hidden;
        /* Mobile: prevent rubber-band scroll + pull-to-refresh. */
        overscroll-behavior: none;
        -webkit-tap-highlight-color: transparent;
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      #app {
        position: relative;
        width: 100%;
        /* Use small viewport unit (svh) where supported — accounts for
           the iOS Safari address bar. Fall back to vh for older browsers. */
        height: 100vh;
        height: 100svh;
        height: 100dvh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* Boot states — centered, full-bleed. */
      .boot-loading,
      .boot-error,
      .boot-empty {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 24px;
        opacity: 0.8;
      }
      .boot-loading h1,
      .boot-error h1,
      .boot-empty h1 {
        font-family: var(--player-font-display);
        font-size: clamp(1.1rem, 3.5vw, 1.6rem);
        letter-spacing: 0.3em;
        text-transform: uppercase;
        color: var(--player-primary);
        margin: 0 0 12px;
      }
      .boot-loading p,
      .boot-error p,
      .boot-empty p {
        font-size: 0.9rem;
        letter-spacing: 0.05em;
        max-width: 60ch;
        line-height: 1.5;
      }
      .boot-error {
        opacity: 1;
      }
      .boot-error h1 {
        color: #ff6f6f;
      }

      /* SHELL — full viewport, no card framing. Chrome overlays content. */
      .hwes-shell {
        flex: 1;
        display: flex;
        flex-direction: column;
        position: relative;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      .hwes-shell--none {
        /* No header, no controls — content owns the screen. */
      }

      /* HEADER — translucent overlay at the top, fades with chrome. */
      .hwes-shell__header {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        padding: calc(env(safe-area-inset-top, 0) + 16px) clamp(16px, 4vw, 32px) 24px;
        background: linear-gradient(180deg, rgba(11, 15, 20, 0.75) 0%, rgba(11, 15, 20, 0) 100%);
        z-index: 10;
        pointer-events: none; /* don't block taps on content underneath */
        transition: opacity var(--player-chrome-fade-ms) ease;
      }
      .hwes-shell__title {
        font-family: var(--player-font-display);
        font-size: clamp(1rem, 2.5vw, 1.4rem);
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--player-primary);
        margin: 0 0 4px;
      }
      .hwes-shell__byline {
        margin: 0;
        font-size: clamp(0.75rem, 1.5vw, 0.9rem);
        color: var(--player-text-muted);
      }
      /* CONTENT — fills the screen behind chrome overlays.
         min-height: 0 is the load-bearing fix for flex-child sizing:
         WITHOUT it, flex items default to min-height:auto (= content
         size), so a large image inside the content slot would push the
         flex chain to its natural size and overflow the viewport.
         WITH it, the flex item can actually shrink to its allotted
         space and object-fit:contain on the image takes effect. */
      .hwes-shell__content {
        flex: 1;
        min-height: 0;
        min-width: 0;
        display: flex;
        flex-direction: column;
        position: relative;
        overflow: hidden;
      }
      /* CONTROLS — translucent overlay at the bottom, fades with chrome. */
      .hwes-shell__controls {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 24px clamp(16px, 4vw, 32px) calc(env(safe-area-inset-bottom, 0) + 16px);
        background: linear-gradient(0deg, rgba(11, 15, 20, 0.75) 0%, rgba(11, 15, 20, 0) 100%);
        z-index: 10;
        transition: opacity var(--player-chrome-fade-ms) ease;
      }

      /* CHROME AUTO-HIDE — JS adds .hwes-shell--idle after 3s of no
         user input. Header + controls fade out; tap/move/key wakes. */
      .hwes-shell--idle .hwes-shell__header,
      .hwes-shell--idle .hwes-shell__controls {
        opacity: 0;
        pointer-events: none;
      }

      /* CARD BASE — content cards live inside the content slot.
         min-height/min-width: 0 + overflow: hidden is the recipe to
         keep large content (esp. images and videos with intrinsic
         dimensions larger than the viewport) inside the card box,
         so object-fit:contain on the inner element actually scales
         down to fit. Without these, intrinsic content size leaks
         through the flex chain and overflows the viewport. */
      .hwes-audio,
      .hwes-video,
      .hwes-image,
      .hwes-document,
      .hwes-sfx {
        flex: 1;
        min-height: 0;
        min-width: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: clamp(16px, 4vw, 48px);
        gap: clamp(16px, 3vw, 32px);
        overflow: hidden;
      }

      /* AUDIO — cover-art-forward by default; controls drive playback.
         Cover sizing is constrained by viewport AND chrome height so it
         can never overflow the available content slot:
           - vmin floor handles narrow phones
           - 50vh cap leaves room for title + chrome (header + controls)
           - 360px ceiling for very wide desktops (don't go cinema-poster)
         Use min() so the smallest constraint wins. */
      .hwes-audio__cover {
        width: min(50vh, 60vmin, 360px);
        height: min(50vh, 60vmin, 360px);
        object-fit: cover;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.04);
        box-shadow: 0 24px 64px rgba(0, 0, 0, 0.5);
      }
      /* CINEMATIC mode (prominence=hero + sizing=fullscreen): visualizer
         IS the primary visual — cover art is a secondary element, sized
         smaller so it doesn't compete. */
      .hwes-audio--hero.hwes-audio--fullscreen .hwes-audio__cover {
        width: min(35vh, 35vmin, 280px);
        height: min(35vh, 35vmin, 280px);
      }
      .hwes-audio__title {
        font-family: var(--player-font-display);
        font-size: clamp(1.2rem, 3vw, 1.8rem);
        letter-spacing: 0.05em;
        margin: 0;
        text-align: center;
      }
      .hwes-audio__element {
        display: none;
      }

      /* VIDEO — fills available space, letterboxed via object-fit. */
      .hwes-video {
        padding: 0;
      }
      .hwes-video__element {
        display: block;
        width: 100%;
        height: 100%;
        background: #000;
        object-fit: contain;
      }
      .hwes-video--cover .hwes-video__element {
        object-fit: cover;
      }
      .hwes-video__meta {
        display: none; /* TV mode: title lives in the chrome header */
      }

      /* IMAGE — same layout as video. The image element fills its
         flex parent (the audio card surrounds it with center alignment)
         and uses object-fit:contain so the source image is letterboxed
         instead of stretched on aspect mismatch. max-width / max-height
         constraints keep the image inside the viewport even when the
         container reports oversized intrinsic dimensions. */
      .hwes-image {
        padding: 0;
      }
      .hwes-image__element {
        display: block;
        width: 100%;
        height: 100%;
        max-width: 100%;
        max-height: 100%;
        background: rgba(255, 255, 255, 0.04);
        object-fit: contain;
      }
      .hwes-image--cover .hwes-image__element {
        object-fit: cover;
      }
      .hwes-image__meta {
        display: none;
      }

      /* DOCUMENT — readable column, fills the screen. */
      .hwes-document {
        padding: clamp(24px, 6vw, 64px);
        max-width: 72ch;
        margin: 0 auto;
        align-items: stretch;
        justify-content: flex-start;
        overflow-y: auto;
      }
      .hwes-document__title {
        font-family: var(--player-font-display);
        font-size: clamp(1.4rem, 3.5vw, 2rem);
        letter-spacing: 0.05em;
        color: var(--player-primary);
        margin: 0 0 24px;
      }
      .hwes-document__body {
        white-space: pre-wrap;
        line-height: 1.7;
        font-size: clamp(0.95rem, 1.8vw, 1.1rem);
      }
      .hwes-document__expand {
        appearance: none;
        background: transparent;
        color: var(--player-primary);
        border: 1px solid var(--player-border);
        border-radius: 999px;
        padding: 10px 20px;
        font-family: var(--player-font-family);
        font-size: 0.9rem;
        cursor: pointer;
        margin-top: 24px;
        min-height: var(--player-touch-target);
      }
      .hwes-document__expand:hover {
        background: rgba(255, 255, 255, 0.05);
      }

      /* SOUND-EFFECT — minimal, transient. */
      .hwes-sfx {
        opacity: 0.7;
      }
      .hwes-sfx__label {
        font-size: 0.9rem;
        color: var(--player-text-muted);
        letter-spacing: 0.05em;
      }
      .hwes-sfx__element {
        display: none;
      }

      /* SCENE layers — visualizer + banner backdrops. Behind everything. */
      .hwes-scene,
      .hwes-visualizer {
        position: absolute;
        inset: 0;
        z-index: 0;
        pointer-events: none;
      }

      /* LYRIC OVERLAYS — text floats over content. */
      .hwes-lyrics {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        top: 18%;
        width: 90%;
        max-width: 720px;
        text-align: center;
        z-index: 5;
        pointer-events: none;
      }
      .hwes-lyrics--scrolling .hwes-lyrics__line {
        font-family: var(--player-font-display);
        font-size: clamp(1.2rem, 3vw, 1.8rem);
        color: var(--player-text);
        text-shadow: 0 2px 12px rgba(0, 0, 0, 0.7);
        opacity: 0;
      }
      .hwes-lyrics--scrolling .hwes-lyrics__line--sweep {
        animation: hwes-lyric-sweep 2.6s cubic-bezier(0.2, 0.8, 0.4, 1);
      }
      @keyframes hwes-lyric-sweep {
        0% { opacity: 0; transform: translateX(-100px); }
        20% { opacity: 1; transform: translateX(0); }
        80% { opacity: 1; transform: translateX(0); }
        100% { opacity: 0; transform: translateX(100px); }
      }

      .hwes-lyrics--spotlight {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
      }
      .hwes-lyrics__slot {
        font-family: var(--player-font-display);
        font-size: clamp(0.9rem, 1.8vw, 1.05rem);
        color: var(--player-text-muted);
        opacity: 0.4;
        text-shadow: 0 2px 12px rgba(0, 0, 0, 0.7);
        transition: all 240ms ease-out;
      }
      .hwes-lyrics__slot--active {
        font-size: clamp(1.2rem, 3vw, 1.8rem);
        color: var(--player-text);
        opacity: 1;
      }

      .hwes-lyrics--typewriter .hwes-lyrics__line {
        font-family: var(--player-font-display);
        font-size: clamp(1.2rem, 3vw, 1.8rem);
        color: var(--player-text);
        display: inline;
        text-shadow: 0 2px 12px rgba(0, 0, 0, 0.7);
      }
      .hwes-lyrics__cursor {
        animation: hwes-lyric-cursor 1s steps(2) infinite;
        color: var(--player-primary);
      }
      @keyframes hwes-lyric-cursor {
        0% { opacity: 1; }
        50% { opacity: 0; }
        100% { opacity: 1; }
      }

      /* GENERIC TEXT OVERLAY — title cards, captions, short notes
         layered on top of any content. */
      .hwes-text-overlay {
        position: absolute;
        left: 50%;
        bottom: 18%;
        transform: translateX(-50%);
        width: min(92%, 720px);
        text-align: center;
        z-index: 5;
        pointer-events: none;
        text-shadow: 0 2px 12px rgba(0, 0, 0, 0.85);
      }
      .hwes-text-overlay__h1 {
        font-family: var(--player-font-display);
        font-size: clamp(1.6rem, 4vw, 2.4rem);
        letter-spacing: 0.05em;
        margin: 0 0 12px;
        color: var(--player-text);
      }
      .hwes-text-overlay__h2 {
        font-family: var(--player-font-display);
        font-size: clamp(1.2rem, 3vw, 1.8rem);
        margin: 0 0 8px;
        color: var(--player-text);
      }
      .hwes-text-overlay__p {
        font-size: clamp(1rem, 2vw, 1.2rem);
        line-height: 1.5;
        margin: 0 0 8px;
        color: var(--player-text);
      }
      .hwes-text-overlay__p:last-child {
        margin-bottom: 0;
      }

      /* WAVEFORM BARS overlay — bottom strip, behind text overlays. */
      .hwes-waveform-bars {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        height: 80px;
        z-index: 3;
        pointer-events: none;
        opacity: 0.6;
      }

      /* CONTROLS — translucent pill row inside the bottom overlay. */
      .hwes-controls {
        display: flex;
        align-items: center;
        gap: 16px;
        max-width: 920px;
        margin: 0 auto;
      }
      .hwes-controls__now-playing {
        flex: 1;
        font-size: clamp(0.85rem, 1.8vw, 0.95rem);
        color: var(--player-text);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .hwes-controls__buttons {
        display: flex;
        gap: 8px;
      }
      .hwes-controls__btn {
        appearance: none;
        background: rgba(255, 255, 255, 0.08);
        color: var(--player-text);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 999px;
        padding: 12px 24px;
        font-family: var(--player-font-family);
        font-size: 0.9rem;
        cursor: pointer;
        min-height: var(--player-touch-target);
        min-width: var(--player-touch-target);
        transition: background 120ms;
      }
      .hwes-controls__btn:hover {
        background: rgba(255, 255, 255, 0.16);
      }
      .hwes-controls__btn--primary {
        background: var(--player-primary);
        color: var(--player-background);
        border-color: var(--player-primary);
        font-weight: 600;
      }
      .hwes-controls__btn--primary:hover {
        background: var(--player-primary);
        opacity: 0.9;
      }
      .hwes-controls__btn:focus-visible {
        outline: 2px solid var(--player-primary);
        outline-offset: 2px;
      }

      /* RESPONSIVE — extra tweaks for narrow phones. */
      @media (max-width: 480px) {
        .hwes-controls__now-playing {
          /* On tiny screens, hide the now-playing label so the
             buttons get full width. The chrome header carries
             the title anyway. */
          display: none;
        }
        .hwes-shell__header {
          padding-bottom: 16px;
        }
      }

      /* REDUCED MOTION — respect the user's preference. The Ken Burns
         + lyric sweep + cursor blink + palette lerp are all "non-essential
         decorative animation" per WCAG 2.3.3. */
      @media (prefers-reduced-motion: reduce) {
        .hwes-lyrics--scrolling .hwes-lyrics__line--sweep,
        .hwes-lyrics__cursor,
        .hwes-lyrics__slot {
          animation: none !important;
          transition: none !important;
        }
      }
    </style>
  </head>
  <body>
    <main id="app">
      <div class="boot-loading">
        <h1>Harmonic Wave</h1>
        <p>Loading the player engine…</p>
      </div>
    </main>

    <!-- Optional server-side schema injection. Platform's /run/:token
         (Step 14 cutover) inlines the HWES response here so the player
         doesn't make a round trip from the browser. boot.js reads this
         tag if present; otherwise falls back to ?fixture=… or MCP. -->
    <!-- <script type="application/json" id="hwes-data">{...}</script> -->

    <script type="module" src="./boot.js"></script>
  </body>
</html>
