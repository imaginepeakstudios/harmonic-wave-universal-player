<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Harmonic Wave Universal Player</title>
    <meta
      name="description"
      content="Open-source HWES v1 reference implementation. Composes any creator's content into a directed, immersive experience."
    />
    <meta name="theme-color" content="#0B0F14" />
    <meta name="robots" content="index, follow" />

    <!--
      TV-feel design language (locked 2026-04-19 per user direction):
        "needs to feel like you're watching and hearing something
         not just going to some website"
        "needs to support both desktop/tablet/mobile"
        "critical it's responsive"

      Translation to CSS:
        - Player fills the entire viewport. No max-width card framing.
        - Chrome (header + controls) overlays the content with translucent
          backing and AUTO-HIDES after inactivity (3s). User wakes them
          by moving the mouse, tapping the screen, or pressing a key.
        - Content cards (audio/video/image) are full-bleed, no card
          borders, no padding when they own the screen.
        - Touch-friendly hit targets (44px+) on tablet/mobile.
        - Safe-area insets for notched phones (`env(safe-area-inset-*)`).
        - 100svh + 100dvh fallback chain for mobile address-bar reality.
        - Visualizer + scene layers fill behind the content as designed.

      Theme custom properties below get overridden at runtime by the
      theme injector when player_theme is present.
    -->
    <link rel="stylesheet" href="./styles/player.css" />
  </head>
  <body>
    <main id="app">
      <!-- Empty by default — boot.js immediately mounts the Network
           Station ID Bumper which IS the loading state (the bumper
           is an opaque overlay; the experience renders behind it as
           the bumper fades). -->
    </main>

    <!-- Optional server-side schema injection. Platform's /run/:token
         (Step 14 cutover) inlines the HWES response here so the player
         doesn't make a round trip from the browser. boot.js reads this
         tag if present; otherwise falls back to ?fixture=… or MCP. -->
    <!-- <script type="application/json" id="hwes-data">{...}</script> -->

    <script type="module" src="./boot.js"></script>
  </body>
</html>
